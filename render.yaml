services:
  - type: web
    name: erich-automobile-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npx prisma db seed && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erich-automobile-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: UPLOAD_DIR
        value: ./uploads
      - key: CORS_ORIGIN
        value: https://erich-automobile-frontend.onrender.com
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: erich-automobile-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://erich-automobile-api.onrender.com

databases:
  - name: erich-automobile-db
    plan: free
